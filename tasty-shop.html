<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TASTY SHOP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0c; --surface: #141418; --surface2: #1c1c22;
    --border: #2a2a32; --accent: #c8ff00; --text: #f0f0f0;
    --muted: #6b6b7a; --card-bg: #13131a;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(200,255,0,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 70%, rgba(124,58,237,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,0.12) 0%, transparent 100%),
      radial-gradient(2px 2px at 50% 30%, rgba(124,58,237,0.25) 0%, transparent 100%);
  }

  /* NAV */
  nav {
    position: sticky; top: 12px; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    margin: 12px 16px 0; padding: 14px 20px;
    background: rgba(20,20,24,0.9); backdrop-filter: blur(20px);
    border-radius: 20px; border: 1px solid var(--border);
  }
  .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--accent); text-shadow: 0 0 20px rgba(200,255,0,0.4); }
  .nav-city { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 6px 12px; font-size: 13px; }
  .nav-admin { width: 38px; height: 38px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: border-color 0.2s; }
  .nav-admin:hover { border-color: var(--accent); }

  /* HERO */
  .hero { position: relative; z-index: 1; text-align: center; padding: 44px 16px 28px; }
  .diamonds { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .diamond { position: absolute; width: 20px; height: 20px; transform: rotate(45deg); animation: float 6s ease-in-out infinite; }
  .diamond:nth-child(1) { top:15%;left:8%; background:rgba(200,255,0,0.12); border:1px solid rgba(200,255,0,0.3); animation-delay:0s; }
  .diamond:nth-child(2) { top:20%;right:12%; background:rgba(124,58,237,0.18); border:1px solid rgba(124,58,237,0.4); width:16px;height:16px; animation-delay:-2s; }
  .diamond:nth-child(3) { bottom:15%;left:18%; background:rgba(124,58,237,0.12); border:1px solid rgba(124,58,237,0.3); width:13px;height:13px; animation-delay:-4s; }
  .diamond:nth-child(4) { top:50%;right:6%; background:rgba(200,255,0,0.08); border:1px solid rgba(200,255,0,0.2); width:18px;height:18px; animation-delay:-1s; }
  @keyframes float { 0%,100%{transform:rotate(45deg) translateY(0)} 50%{transform:rotate(45deg) translateY(-10px)} }
  .hero-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(72px,20vw,120px); letter-spacing:4px; line-height:0.9; color:#fff; animation:glow 3s ease-in-out infinite; }
  @keyframes glow { 0%,100%{text-shadow:0 0 60px rgba(200,255,0,0.12)} 50%{text-shadow:0 0 80px rgba(200,255,0,0.22)} }
  .hero-sub { margin-top:14px; color:var(--muted); font-size:15px; font-weight:300; }

  /* SEARCH */
  .search-wrap { position:relative; z-index:1; padding:0 16px; margin-bottom:20px; }
  .search-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:15px 20px 15px 46px; color:var(--text); font-family:'Inter',sans-serif; font-size:15px; outline:none; transition:border-color 0.2s; }
  .search-input::placeholder { color:var(--muted); }
  .search-input:focus { border-color:rgba(200,255,0,0.4); }
  .search-icon { position:absolute; left:30px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:16px; }

  /* TABS */
  .tabs { position:relative; z-index:1; display:flex; gap:8px; padding:0 16px; margin-bottom:20px; }
  .tab { flex:1; padding:12px; border-radius:14px; border:1px solid var(--border); background:var(--surface); color:var(--muted); font-family:'Inter',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s; text-align:center; }
  .tab.active { background:var(--accent); color:#000; border-color:var(--accent); }
  .tab:not(.active):hover { border-color:rgba(200,255,0,0.3); color:var(--text); }

  /* GRID */
  .grid-section { position:relative; z-index:1; padding:0 16px 100px; }
  .grid-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .grid-label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
  .grid-count { font-size:12px; color:var(--muted); }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  /* CARD */
  .card { background:var(--card-bg); border:1px solid var(--border); border-radius:20px; overflow:hidden; transition:border-color 0.25s,transform 0.2s; }
  .card:hover { border-color:rgba(200,255,0,0.25); transform:translateY(-2px); }
  .card-img { width:100%; aspect-ratio:1; background:var(--surface2); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
  .card-img::after { content:''; position:absolute; inset:0; background:radial-gradient(circle at 50% 85%,rgba(200,255,0,0.04) 0%,transparent 70%); }
  .card-badge { position:absolute; top:10px; left:10px; padding:3px 8px; border-radius:8px; font-size:10px; font-weight:700; z-index:2; }
  .badge-hot { background:#ff4444; color:#fff; }
  .badge-new { background:var(--accent); color:#000; }
  .card-fav { position:absolute; top:10px; right:10px; width:30px; height:30px; background:rgba(0,0,0,0.55); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; z-index:2; cursor:pointer; transition:transform 0.2s; border:none; }
  .card-fav:hover { transform:scale(1.2); }
  .card-body { padding:12px; }
  .card-brand { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
  .card-stock { color:var(--accent); }
  .card-stock.low { color:#ff6b6b; }
  .card-name { font-size:13px; font-weight:600; line-height:1.3; margin-bottom:10px; }
  .card-price { font-size:17px; font-weight:700; color:var(--accent); }

  /* EMPTY STATE */
  .empty { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-icon { font-size:48px; margin-bottom:12px; }
  .empty-text { font-size:15px; }

  /* ADMIN */
  .admin-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.88); backdrop-filter:blur(12px); z-index:500; display:none; align-items:center; justify-content:center; padding:24px; }
  .admin-overlay.open { display:flex; }
  .admin-box { background:var(--surface); border:1px solid var(--border); border-radius:24px; padding:28px; max-width:340px; width:100%; }
  .admin-title { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:2px; color:var(--accent); margin-bottom:4px; }
  .admin-sub { color:var(--muted); font-size:13px; margin-bottom:18px; }
  .admin-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:12px 16px; color:var(--text); font-family:'Inter',sans-serif; font-size:15px; outline:none; margin-bottom:10px; transition:border-color 0.2s; }
  .admin-input:focus { border-color:rgba(200,255,0,0.4); }
  .admin-btn { width:100%; padding:13px; border-radius:12px; border:none; font-family:'Inter',sans-serif; font-size:14px; font-weight:600; cursor:pointer; margin-bottom:8px; transition:opacity 0.2s; }
  .admin-btn:hover { opacity:0.88; }
  .btn-primary { background:var(--accent); color:#000; }
  .btn-close { background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
  .admin-rows { display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
  .admin-row { background:var(--surface2); border:1px solid var(--border); border-radius:14px; padding:14px; }
  .admin-row-name { font-size:13px; font-weight:600; margin-bottom:8px; }
  .admin-row-controls { display:flex; align-items:center; gap:8px; }
  .admin-row-controls label { font-size:11px; color:var(--muted); flex-shrink:0; }
  .admin-qty { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:8px 10px; color:var(--text); font-family:'Inter',sans-serif; font-size:15px; font-weight:700; outline:none; text-align:center; }
  .admin-qty:focus { border-color:var(--accent); }

  /* TOAST */
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--accent); color:#000; padding:10px 22px; border-radius:50px; font-size:13px; font-weight:600; opacity:0; transition:all 0.3s; z-index:300; white-space:nowrap; pointer-events:none; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Admin -->
<div class="admin-overlay" id="adminOverlay">
  <div class="admin-box">
    <div id="adminLogin">
      <div class="admin-title">🔐 ADMIN</div>
      <p class="admin-sub">Введи пароль</p>
      <input class="admin-input" type="password" id="adminPass" placeholder="Пароль..." onkeydown="if(event.key==='Enter')checkPass()">
      <button class="admin-btn btn-primary" onclick="checkPass()">Войти</button>
      <button class="admin-btn btn-close" onclick="closeAdmin()">Отмена</button>
    </div>
    <div id="adminEdit" style="display:none">
      <div class="admin-title">📦 СКЛАД</div>
      <p class="admin-sub">Измени количество товаров</p>
      <div class="admin-rows" id="adminRows"></div>
      <button class="admin-btn btn-primary" onclick="saveAdmin()">Сохранить ✓</button>
      <button class="admin-btn btn-close" onclick="closeAdmin()">Закрыть</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- NAV -->
<nav>
  <div class="nav-logo">TASTY SHOP</div>
  <div class="nav-city">📍 Stuttgart</div>
  <div class="nav-admin" onclick="openAdmin()">⚙️</div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="diamonds">
    <div class="diamond"></div><div class="diamond"></div>
    <div class="diamond"></div><div class="diamond"></div>
  </div>
  <div class="hero-title">КАТАЛОГ</div>
  <p class="hero-sub">Огромный выбор для каждого</p>
</div>


<!-- SHARE -->
<div style="position:relative;z-index:1;padding:0 16px 16px">
  <button onclick="shareShop()" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;background:linear-gradient(135deg,rgba(200,255,0,0.08),rgba(124,58,237,0.08));border:1px solid rgba(200,255,0,0.25);border-radius:16px;color:var(--accent);font-family:Inter,sans-serif;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:0.3px">
    <span style="font-size:18px">🔗</span> Поделиться магазином
  </button>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input class="search-input" type="text" placeholder="Поиск товара..." id="searchInput" oninput="render()">
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="setTab('all', this)">Все товары</div>
  <div class="tab" onclick="setTab('fav', this)">❤️ Избранное</div>
</div>

<!-- GRID -->
<div class="grid-section">
  <div class="grid-header">
    <span class="grid-label" id="gridLabel">Товары</span>
    <span class="grid-count" id="gridCount"></span>
  </div>
  <div class="grid" id="productGrid"></div>
</div>

<script>
const PASS = 'tasty2025';

let products = [
  { id:1, name:'ELF JACK', emoji:'🧝', badge:'hot',  stock:60 },
  { id:2, name:'Spearmint', emoji:'🌿', badge:'new',  stock:10 },
  { id:3, name:'BlackBerry Lemon', emoji:'🫐', badge:null, stock:39 },
];

let favorites = new Set();
let currentTab = 'all';

function shareShop() {
  const url = 'https://tastyvape.de';
  if (navigator.share) {
    navigator.share({ title: 'TASTY SHOP', text: '🧝 ELF JACK вейпы в Штутгарте!', url: url })
      .catch(() => copyToClipboard(url));
  } else {
    copyToClipboard(url);
  }
}
function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast('Ссылка скопирована! 🔗'));
  } else {
    const el = document.createElement('textarea');
    el.value = text; el.style.position = 'fixed'; el.style.opacity = '0';
    document.body.appendChild(el); el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('Ссылка скопирована! 🔗');
  }
}

function render() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let list = products.filter(p => p.name.toLowerCase().includes(search));
  if (currentTab === 'fav') list = list.filter(p => favorites.has(p.id));

  document.getElementById('gridCount').textContent = list.length + ' шт';
  document.getElementById('gridLabel').textContent = currentTab === 'fav' ? 'Избранное' : 'Товары';

  const grid = document.getElementById('productGrid');

  if (list.length === 0) {
    grid.innerHTML = '';
    grid.insertAdjacentHTML('afterend', '');
    grid.outerHTML = `<div class="grid" id="productGrid"></div>`;
    document.getElementById('productGrid').insertAdjacentHTML('afterend',
      `<div class="empty" id="emptyState">
        <div class="empty-icon">${currentTab==='fav' ? '🤍' : '🔍'}</div>
        <div class="empty-text">${currentTab==='fav' ? 'Нет избранных товаров' : 'Ничего не найдено'}</div>
      </div>`
    );
    return;
  }

  const old = document.getElementById('emptyState');
  if (old) old.remove();

  grid.innerHTML = list.map(p => `
    <div class="card">
      <div class="card-img">
        ${p.badge ? `<div class="card-badge badge-${p.badge}">${p.badge==='hot'?'🔥 ХИТ':'НОВИНКА'}</div>` : ''}
        <button class="card-fav" onclick="toggleFav(${p.id})">
          ${favorites.has(p.id) ? '❤️' : '🤍'}
        </button>
        <span style="font-size:54px">${p.emoji}</span>
      </div>
      <div class="card-body">
        <div class="card-brand">ELF JACK · <span class="card-stock ${p.stock<=10?'low':''}">${p.stock} шт</span></div>
        <div class="card-name">${p.name}</div>
        <div class="card-price">€15.00</div>
      </div>
    </div>
  `).join('');
}

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function toggleFav(id) {
  if (favorites.has(id)) {
    favorites.delete(id);
    showToast('Удалено из избранного');
  } else {
    favorites.add(id);
    showToast('Добавлено в избранное ❤️');
  }
  render();
}

// ADMIN
function openAdmin() {
  document.getElementById('adminOverlay').classList.add('open');
  document.getElementById('adminLogin').style.display = 'block';
  document.getElementById('adminEdit').style.display = 'none';
  document.getElementById('adminPass').value = '';
  setTimeout(() => document.getElementById('adminPass').focus(), 150);
}
function closeAdmin() {
  document.getElementById('adminOverlay').classList.remove('open');
}
function checkPass() {
  if (document.getElementById('adminPass').value === PASS) {
    document.getElementById('adminLogin').style.display = 'none';
    document.getElementById('adminEdit').style.display = 'block';
    document.getElementById('adminRows').innerHTML = products.map(p => `
      <div class="admin-row">
        <div class="admin-row-name">${p.emoji} ${p.name}</div>
        <div class="admin-row-controls">
          <label>Кол-во:</label>
          <input class="admin-qty" type="number" min="0" value="${p.stock}" id="qty-${p.id}">
        </div>
      </div>
    `).join('');
  } else {
    document.getElementById('adminPass').style.borderColor = '#ff4444';
    showToast('Неверный пароль ❌');
    setTimeout(() => document.getElementById('adminPass').style.borderColor = 'var(--border)', 1500);
  }
}
function saveAdmin() {
  products.forEach(p => {
    const el = document.getElementById('qty-' + p.id);
    if (el) p.stock = Math.max(0, parseInt(el.value) || 0);
  });
  closeAdmin();
  render();
  showToast('Склад обновлён ✅');
}

// TOAST
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

render();
</script>
</body>
</html>
